## WSL2 → Windows → Phone Firewall Debug Summary

### The Actual Problem
WSL2's `vEthernet (WSL)` adapter gets classified as **Public profile** by Windows. Public profile's default inbound block overrides allow rules — so firewall rules alone can never work for WSL traffic.

### What You Learned

**Yesterday's "working" rules weren't doing what you thought:**
- Connection was going via **USB/ADB forward** (`adb forward tcp:8055 tcp:8055`)
- Firewall was irrelevant — traffic never went through WiFi
- `-RemoteAddress 172.28.0.0/20` only works for traffic originating from WSL subnet, not from your phone over WiFi

**ProtonVPN is NOT the problem** — turning off Windows Firewall still leaves WFP filters active, so if ProtonVPN was blocking it would have blocked with firewall off too. It worked with firewall off, so ProtonVPN is innocent.

### The Fix That Works
```powershell
Set-NetFirewallProfile -Profile Public -DisabledInterfaceAliases "vEthernet (WSL)"
```
Excludes the WSL adapter from Public profile entirely.

**Undo with:**
```powershell
Set-NetFirewallProfile -Profile Public -DisabledInterfaceAliases @()
```

**Make it survive reboot:**
```powershell
$action = New-ScheduledTaskAction -Execute "PowerShell.exe" -Argument '-WindowStyle Hidden -Command "Set-NetFirewallProfile -Profile Public -DisabledInterfaceAliases \"vEthernet (WSL)\""'
$trigger = New-ScheduledTaskTrigger -AtLogOn
$principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -RunLevel Highest
Register-ScheduledTask -TaskName "WSL Firewall Fix" -Action $action -Trigger $trigger -Principal $principal
```

### Open Questions For New Chat
- Does your app connect via USB/ADB or WiFi — and does it need to support both?
- Does `DisabledInterfaceAliases` survive reboot on your machine without the scheduled task?
- Your `wsl_network_dead()` function has a bug — `ConnectionRefusedError` means host IS reachable, not dead

### Key Commands Reference
```powershell
# Check firewall log
type %systemroot%\system32\LogFiles\Firewall\pfirewall.log | findstr 8055

# Check portproxy
netsh interface portproxy show all

# Backup firewall rules
netsh advfirewall export "C:\Users\RaptorPatrolCore\fw_backup.wfw"

# Check WSL IP
# In WSL:
ip -4 addr show eth0
```
