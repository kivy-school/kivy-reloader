uv cache clean
uv run ksproject android build debug
Then reinstall as usual. uv caches built wheels from local projects by content hash, but it isn't picking up the .kv change — clearing the cache forces it to rebuild the wheel fresh and bundle the updated file.

This is another instance of the same --target problem: because ksproject just runs uv pip install --target with no --reinstall flag, it silently skips rebuilding if it finds a cached wheel that looks valid.

