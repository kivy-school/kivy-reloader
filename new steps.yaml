=-=-==************ KSPROJECT INTEGRATION NOTES ************=-=-=-==


Here's the full list of what was discovered:

Android build failures

kivy-reloader[desktop] in [project].dependencies pulls psutil into the Android cross-install — psutil has no aarch64-linux-android wheel so the build dies. Fix: [desktop] belongs in [dependency-groups].dev only.
trio >= 0.33.0 unconditionally imports socket.if_indextoname which doesn't exist in Android Python's pure-Python socket fallback. The app crashes on startup before any of your code runs.
adb / WSL

ksproject hardcodes its own SDK adb (~/.kivyschool/android-sdk/platform-tools/adb) — it never looks at PATH, and shell aliases (alias adb='adb.exe') are never visible to subprocesses anyway. These are two separate adb servers with different RSA keys, so the phone rejects ksproject's Linux adb as unauthorized.
kivy-reloader already handles this with explicit WSL detection and cmd.exe /c adb.exe calls — ksproject doesn't.
Windows adb needs wslpath -w to convert Linux paths to Windows-style paths when calling it from WSL.
ksproject deployment gaps

ksproject android run has no uninstall step — it just does adb install -r. On a signature mismatch (old APK from a different keystore) it fails. You have to manually adb uninstall first. kivy-reloader detects INSTALL_FAILED_UPDATE_INCOMPATIBLE and does the uninstall+retry automatically.
ksproject android devices only lists devices known to its own SDK adb server — WiFi devices you connected through Windows adb are invisible to it.
Init workflow gap

Neither ksproject init nor kivy-reloader init project writes the correct pyproject.toml dependencies for you. ksproject init adds nothing kivy-reloader related. kivy-reloader init project scaffolds the code but never touches pyproject.toml. You have to wire them together manually, and getting [desktop] vs base package in the right groups matters a lot.

=-=-=-=-
Found the key thing. uv pip install --target at line 34-36 — there's no clean step before it. It's purely additive. So:

Add a dep → next build installs it into project_dist/gradle/site_packages/arm64-v8a/ ✅
Remove a dep → next build does nothing to remove it — old package stays in site_packages ⚠️
For the APK itself, adb install -r is the update mechanism — it replaces the APK on the device while keeping user data, and it works fine as long as the signing key hasn't changed. That's the normal iteration loop: rebuild → adb install -r → app updates.

The --target flag the user probably told you about is the uv pip install --target <dir> call — it's how Python packages get bundled into the APK (installed into a directory that Gradle then packages). Not a cleanup flag, just how the cross-install works.

The signature mismatch case (what kivy-reloader handles) only happens when the keystore changes — switching machines, deleting ~/.android/debug.keystore, or going from buildozer to ksproject. Normal day-to-day rebuilds on the same machine use the same debug keystore so adb install -r just works.

To force a proper clean build when you suspect stale packages:


uv run ksproject android build debug --clean
That runs ./gradlew clean assembleDebug, but note it cleans Gradle outputs — it does not wipe site_packages/. To fully reset Python deps you'd need to delete project_dist/gradle/site_packages/ manually first.


