You can absolutely **undo** that firewall rule and you can also **detect** whether it exists — all from inside WSL — using `powershell.exe`. You don’t need to switch to Windows manually.

Let me give you the clean, reliable, script‑friendly way to do both.

---

# ⭐ 1. Undo (delete) the firewall rule from WSL

If you created the rule like this:

```
New-NetFirewallRule -DisplayName "ADB WSL Access" ...
```

Then you can delete it from WSL with:

```bash
powershell.exe -Command 'Start-Process powershell -Verb RunAs -ArgumentList "Remove-NetFirewallRule -DisplayName \"ADB WSL Access\""' 
```

This will trigger a UAC popup (because firewall changes require elevation), and then the rule is removed.

---

# ⭐ 2. Detect whether the rule exists (from WSL)

You can query Windows Firewall rules from WSL like this:

```bash
powershell.exe -Command "Get-NetFirewallRule -DisplayName 'ADB WSL Access' | Select-Object -ExpandProperty DisplayName"
```

If the rule exists, it prints:

```
ADB WSL Access
```

If it does **not** exist, it prints nothing and exits with a non‑zero code.

### In Python or Bash, you can check this:

### **Bash example**
```bash
if powershell.exe -Command "Get-NetFirewallRule -DisplayName 'ADB WSL Access'" | grep -q "ADB WSL Access"; then
    echo "Rule exists"
else
    echo "Rule missing"
fi
```

### **Python example**
```python
import subprocess

result = subprocess.run(
    ["powershell.exe", "-Command", "Get-NetFirewallRule -DisplayName 'ADB WSL Access'"],
    capture_output=True, text=True
)

if "ADB WSL Access" in result.stdout:
    print("Rule exists")
else:
    print("Rule missing")
```

This gives you a clean, script‑friendly detection mechanism.

---

