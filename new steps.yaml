Your `.bashrc` is setting `DISPLAY` to the nameserver IP (a WSL2 networking workaround), but with **mirrored networking mode**, that's wrong — mirrored networking makes `localhost` work directly, so you don't need to hunt for the host IP.

**The fix:**

In your `.bashrc`, change this line:
```bash
export DISPLAY=$(grep -m1 nameserver /etc/resolv.conf | awk '{print $2}'):0.0
```
to:
```bash
export DISPLAY=:0.0
```

Or if WSLg is your target (which it should be with mirrored networking), you can just **remove the `DISPLAY` export entirely** — WSLg sets both `DISPLAY` and `WAYLAND_DISPLAY` automatically on startup, and your `echo` already shows `wayland-0` is set correctly.

**Why this happens:** The nameserver trick was the classic WSL2 workaround to find the Windows host IP for forwarding X11 to an external X server (like VcXsrv). With mirrored networking, the host is reachable at `localhost`/`127.0.0.1`, and WSLg handles the socket itself — overriding `DISPLAY` with the nameserver IP breaks it.

**Steps:**
1. Remove or comment out that `export DISPLAY=...` line
2. Run `source ~/.bashrc` or open a new terminal
3. Check: `echo $DISPLAY` should show `:0` and `echo $WAYLAND_DISPLAY` should show `wayland-0`

Your `adb`/`scrcpy`/`bundletool` aliases are fine and unrelated to this.
