flow is:



1. Create the project

uv init myapp
cd myapp

2. Add ksproject (build tool, dev-only)

uv add --dev "git+https://github.com/kivy-school/ksproject"
uv run ksproject init

This writes [tool.kivy-school] into pyproject.toml and creates src/myapp/.

3. Add kivy-reloader

uv add "kivy-reloader"
uv run kivy-reloader init project

to run:



5. Run on desktop

uv run myapp        # via pyproject.toml [project.scripts] entry
# or
uv run python main.py

6. Build and deploy to phone

uv run kivy-reloader run

