Commands to get it to phone

# 1. Build the APK (first run downloads SDK/NDK/Java — takes a while)
uv run ksproject android build debug

# 2. See what devices are connected
uv run ksproject android devices

# 3. Install + launch on a real device
uv run ksproject android run --uuid <adb-serial>

# OR launch on an emulator AVD by name
uv run ksproject android run --name <avd-name>
What android build debug actually does (three stages)

install_site_packages()
  └─ uv pip install <project> --python-platform aarch64-linux-android
     → project_dist/gradle/site_packages/arm64-v8a/

collect gradle configs from site_packages (any .gradle/*.json)

generate()
  └─ writes Gradle files, copies CPython stdlib + jniLibs

./gradlew assembleDebug
  → project_dist/gradle/app/build/outputs/apk/debug/app-debug.apk
android run doesn't rebuild — it finds the existing APK from the last build, does adb install, then adb shell am start.

Note on kivy-reloader
You added kivy-reloader in the uv add step, which puts it in [project].dependencies. That means it goes into the Android APK. The trio crash you just saw will still happen unless you sort out the trio version before you test on phone. Worth getting the blank ksproject app booting first (no kivy-reloader in deps at all), then add it once that's confirmed working.

