Here are the three files to change and one to create:

1. src/helloworld/app.py — one line change:


# FROM:
from kivy.app import App

# TO:
from kivy_reloader.app import App
Everything else in app.py stays the same. kivy_reloader.App is a drop-in replacement — on Android it becomes AndroidApp, on desktop DesktopApp, in production it falls back to plain kivy.app.App.

2. main.py at project root — replace entirely:


import trio
from helloworld.app import KivyIntroApp

app = KivyIntroApp()
trio.run(app.async_run, "trio")
The trio.run() is mandatory — it's what runs the TCP server on the phone that receives hot-reload file pushes.

3. Create kivy-reloader.toml at project root:


[kivy_reloader]
HOT_RELOAD_ON_PHONE = true
FULL_RELOAD_FILES = ["main.py", "src/helloworld/app.py"]
WATCHED_FOLDERS_RECURSIVELY = ["."]
STREAM_USING = "WIFI"
4. pyproject.toml — add kivy-reloader back to main deps (base only, no [desktop]):


dependencies = [
    "kivy>=2.3.1",
    "kivy-reloader",
    "trio>=0.33.0",
]

[dependency-groups]
dev = [
    "ksproject",
    "kivy-reloader[desktop]",
]
That's the full diff. The blocker remains: once you make these changes, the Android app will crash on startup because android_app.py does import trio at module level and trio 0.33.0 fails on Android Python. The changes above are correct — but they won't work until the trio version issue is resolved.
