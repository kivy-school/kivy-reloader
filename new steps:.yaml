🔍 2. List rules by internal Name (if you used ADB_WSL_Dynamic_Ports)
powershell

Get-NetFirewallRule | Where-Object { $_.Name -like "*ADB*" }

This is useful because Name cannot contain spaces, so it’s easier to search.
--=-=-=-=-=
⭐ Remove ALL rules with that DisplayName

Run this in elevated PowerShell (Run as Administrator):
powershell

Get-NetFirewallRule | Where-Object { $_.DisplayName -eq "ADB WSL Dynamic Ports" } | Remove-NetFirewallRule

This deletes every rule whose DisplayName matches exactly.
⭐ If you want to preview before deleting
powershell

Get-NetFirewallRule | Where-Object { $_.DisplayName -eq "ADB WSL Dynamic Ports" }

If the list looks correct, then run the delete command.
⭐ If you want to delete by partial match (safer if you’re unsure)
powershell

Get-NetFirewallRule | Where-Object { $_.DisplayName -like "*ADB WSL*" } | Remove-NetFirewallRule

This catches:

    ADB WSL Dynamic Ports

    ADB WSL Dynamic Ports (copy)

    Any variant your script may have created

⭐ If you want to delete by internal Name (recommended going forward)

Some of your rules have GUID names like:
Code

{4ac44795-982b-44e8-801b-84791dc00782}

Others have a readable name:
Code

ADB WSL Dynamic Ports

To delete all rules whose Name contains “ADB”:
powershell

Get-NetFirewallRule | Where-Object { $_.Name -like "*ADB*" } | Remove-NetFirewallRule

This is the most thorough cleanup.
⭐ After cleanup, verify nothing remains
powershell

Get-NetFirewallRule | Where-Object { $_.DisplayName -like "*ADB*" }

If nothing prints, you’re clean.
